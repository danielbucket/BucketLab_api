# Production Docker Compose Configuration for Ubuntu Server
# Uses custom Dockerfiles to avoid volume mounting issues

services:
  # Cloudflare Tunnel Service
  cloudflared:
    env_file: ".env"
    container_name: cloudflared
    hostname: bucketlab-API-tunnel
    image: cloudflare/cloudflared:latest
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    network_mode: host
    volumes:
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "cloudflared"]
      interval: 30s
      timeout: 10s
      retries: 5

  # MongoDB Server
  mongodb:
    container_name: bucketlab_database
    build:
      context: .
      dockerfile: Dockerfile.mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_DB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_DB_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB_DATABASE}
    expose:
      - "27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - bucketLab_internal
    restart: unless-stopped
    depends_on:
      cloudflared:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:27017"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Application Gateway Server
  app_server:
    container_name: app_server
    build:
      context: .
      dockerfile: Dockerfile.app
    environment:
      - MONGO_URI=mongodb://${MONGO_DB_USERNAME}:${MONGO_DB_PASSWORD}@mongodb:27017/?authSource=admin
      - NODE_ENV=${APP_RUN_MODE:-prod}
      - PORT=4020
    ports:
      - "4020:4020"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - bucketLab_internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4020/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  ## Database Servers
  ## Each database server has its own container for better isolation and easier debugging during development.

  # Profiles Server (Internal Service)
  profiles_server:
    container_name: profiles_server
    build:
      context: .
      dockerfile: Dockerfile.profiles
    environment:
      - MONGO_URI=mongodb://${MONGO_DB_USERNAME}:${MONGO_DB_PASSWORD}@mongodb:27017/?authSource=admin
      - NODE_ENV=${APP_RUN_MODE:-prod}
      - PORT=4021
    expose:
      - "4021"
    volumes:
      - avatars_data:/profiles/uploads/avatars
    depends_on:
      app_server:
        condition: service_started
    networks:
      - bucketLab_internal
    restart: unless-stopped

  # Messages Server (Internal Service)
  messages_server:
    container_name: messages_server
    build:
      context: .
      dockerfile: Dockerfile.messages
    environment:
      - "MONGO_URI=mongodb://${MONGO_DB_USERNAME}:${MONGO_DB_PASSWORD}@mongoDB:27017/?authSource=admin"
      - NODE_ENV=${APP_RUN_MODE:-prod}
      - PORT=4022
    expose:
      - "4022"
    depends_on:
      app_server:
        condition: service_started
    networks:
      - bucketLab_internal
    restart: unless-stopped

  # Laboratory Server (Internal Service)
  laboratory_server:
    container_name: laboratory_server
    build:
      context: .
      dockerfile: Dockerfile.laboratory
    environment:
      - "MONGO_URI=mongodb://${MONGO_DB_USERNAME}:${MONGO_DB_PASSWORD}@mongoDB:27017/?authSource=admin"
      - NODE_ENV=${APP_RUN_MODE:-prod}
      - PORT=4023
    expose:
      - "4023"
    depends_on:
      app_server:
        condition: service_started
    networks:
      - bucketLab_internal
    restart: unless-stopped
  
  # Authentication Server (Internal Service)
  authentication_server:
    container_name: authentication_server
    build:
      context: .
      dockerfile: Dockerfile.authentication
    environment:
      - "MONGO_URI=mongodb://${MONGO_DB_USERNAME}:${MONGO_DB_PASSWORD}@mongoDB:27017/?authSource=admin"
      - NODE_ENV=${APP_RUN_MODE:-prod}
      - PORT=4024
    expose:
      - "4024"
    depends_on:
      app_server:
        condition: service_started
    networks:
      - bucketLab_internal
    restart: unless-stopped

  # Let's Encrypt Companion (for SSL Certificates)
  # certbot:
  #   container_name: certbot
  #   image: certbot/certbot:latest
  #   volumes:
  #     - certbot_data:/etc/letsencrypt
  #   networks:
  #     - bucketLab_internal
  #   restart: unless-stopped

volumes:
  mongodb_data:
    driver: local
  avatars_data:
    driver: local

networks:
  bucketLab_internal:
    driver: bridge
    name: bucketLab_internal
