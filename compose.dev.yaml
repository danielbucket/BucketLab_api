# Development Docker Compose Configuration
# Live reload, open ports, and relaxed resource limits for local development

services:
  # Cloudflare Tunnel Service
  cloudflared:
    env_file: .env
    container_name: cloudflared_dev
    hostname: bucketlab-API-tunnel_dev
    image: cloudflare/cloudflared:latest
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    networks: host  # Required for tunnel to access host services
    volumes:
      - /etc/localtime:/etc/localtime:ro
    restart: always
    depends_on:
      app_server:
        condition: service_started

  # Application Servers
  app_server:
    container_name: app_server_dev
    build:
      context: .
      dockerfile: Dockerfile.app
    environment:
      - MONGO_URI=mongodb://${MONGO_DB_USERNAME}:${MONGO_DB_PASSWORD}@mongoDB:27017/?authSource=admin
      - NODE_ENV=development
      - PORT=4020
    ports:
      - "4020:4020"
    volumes:
      - ./app:/usr/src/app
    depends_on:
      mongoDB:
        condition: service_started
    networks:
      - bucketLab_internal
    restart: always

  # Database Servers
  ## Each database server has its own container for better isolation and easier debugging during development.

  # Profiles Server
  profiles_server:
    container_name: profiles_server_dev
    build:
      context: .
      dockerfile: Dockerfile.profiles
    environment:
      - MONGO_URI=mongodb://${MONGO_DB_USERNAME}:${MONGO_DB_PASSWORD}@mongoDB:27017/?authSource=admin
      - NODE_ENV=development
      - PORT=4021
    expose:
      - "4021"
    volumes:
      - ./profiles:/usr/src/profiles
      - ./avatars_data_dev:/usr/src/profiles/uploads/avatars
    depends_on:
      mongoDB:
        condition: service_started
    networks:
      - bucketLab_internal
    restart: always

  # Messages Server
  messages_server:
    container_name: messages_server_dev
    build:
      context: .
      dockerfile: Dockerfile.messages
    environment:
      - "MONGO_URI=mongodb://${MONGO_DB_USERNAME}:${MONGO_DB_PASSWORD}@mongoDB:27017/?authSource=admin"
      - NODE_ENV=development
      - PORT=4022
    expose: 
      - "4022"
    depends_on:
      mongoDB:
        condition: service_healthy
    networks:
      - bucketLab_internal
    restart: always

  # Laboratory Server
  laboratory_server:
    container_name: laboratory_server_dev
    build:
      context: .
      dockerfile: Dockerfile.laboratory
    environment:
      - "MONGO_URI=mongodb://${MONGO_DB_USERNAME}:${MONGO_DB_PASSWORD}@mongoDB:27017/?authSource=admin"
      - NODE_ENV=development
      - PORT=4023
    expose:
      - "4023"
    depends_on:
      mongoDB:
        condition: service_healthy
    networks:
      - bucketLab_internal
    restart: unless-stopped

  # MongoDB Server
  mongoDB:
    container_name: bucketlab_empire_database_dev
    image: mongo:7.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_DB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_DB_PASSWORD}
      MONGO_INITDB_DATABASE: bucketlab
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data_dev:/data/db
    networks:
      - bucketLab_internal
    restart: unless-stopped

volumes:
  mongodb_data_dev:
    driver: local
  avatars_data_dev:
    driver: local

networks:
  bucketLab_internal:
    driver: bridge
    name: bucketLab_internal
