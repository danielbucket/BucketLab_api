# Development Docker Compose Configuration
# Live reload, open ports, and relaxed resource limits for local development

services:
  # Cloudflare Tunnel Service
  cloudflared:
    env_file: .env.dev
    container_name: cloudflared_dev
    image: cloudflare/cloudflared:latest
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    network_mode: host
    volumes:
      - /etc/localtime:/etc/localtime:ro
    restart: always
    healthcheck:
      test: ["CMD", "pgrep", "cloudflared"]
      interval: 10s
      timeout: 10s
      retries: 5

  # MongoDB Server
  mongodb:
    container_name: bucketlab_database_dev
    build:
      context: .
      dockerfile: docker/dev/Dockerfile.mongodb
    environment: {}
    command: mongod --noauth
    ports:
      - "0.0.0.0:27017:27017"
    volumes:
      - mongodb_data_dev:/data/db
    networks:
      - bucketLab_internal
    restart: unless-stopped
    depends_on:
      cloudflared:
        condition: service_started
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.version()"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  # MongoDB Init Helper - wait for MongoDB to be ready
  mongodb-init:
    image: mongo:7.0
    container_name: mongodb_init_helper
    command: >
      mongosh "mongodb://mongodb:27017/admin" --eval "
        db.adminCommand('ping');
        print('MongoDB ready');
      "
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - bucketLab_internal
    restart: no

  # Mongo Express for DB GUI (debug tool)
  mongo-express:
    image: mongo-express
    container_name: mongo_express_dev
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_URL=mongodb://mongodb:27017
      - NODE_ENV=development
      - ME_CONFIG_BASICAUTH=false
    ports:
      - "0.0.0.0:8081:8081"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - bucketLab_internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 20s
      timeout: 10s
      retries: 5

  # Application Gateway Server
  app_server:
    container_name: app_server_dev
    build:
      context: .
      dockerfile: docker/dev/Dockerfile.app
    environment:
      - MONGO_URI=mongodb://mongodb:27017/?authSource=admin
      - NODE_ENV=${APP_RUN_MODE:-development}
      - PORT=4020
    ports:
      - "0.0.0.0:4020:4020"
    volumes:
      - ./app:/usr/src/app
    depends_on:
      mongodb-init:
        condition: service_completed_successfully
    networks:
      - bucketLab_internal
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4020/health"]
      interval: 20s
      timeout: 10s
      retries: 3

  ## Database Servers
  ## Each database server has its own container for better isolation and easier debugging during development.

  # Profiles Server
  profiles_server:
    container_name: profiles_server_dev
    build:
      context: .
      dockerfile: docker/dev/Dockerfile.profiles
    environment:
      - MONGO_URI=mongodb://mongodb:27017/?authSource=admin
      - NODE_ENV=${APP_RUN_MODE:-development}
      - PORT=4021
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
    expose:
      - "4021"
    volumes:
      - ./profiles:/usr/src/profiles
    depends_on:
      mongodb-init:
        condition: service_completed_successfully
    networks:
      - bucketLab_internal
    restart: always

  # Messages Server
  messages_server:
    container_name: messages_server_dev
    build:
      context: .
      dockerfile: docker/dev/Dockerfile.messages
    environment:
      - MONGO_URI=mongodb://mongodb:27017/?authSource=admin
      - NODE_ENV=${APP_RUN_MODE:-development}
      - PORT=4022
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
    expose:
      - "4022"
    volumes:
      - ./messages:/usr/src/messages
    depends_on:
      mongodb-init:
        condition: service_completed_successfully
    networks:
      - bucketLab_internal
    restart: always

  # Laboratory Server
  laboratory_server:
    container_name: laboratory_server_dev
    build:
      context: .
      dockerfile: docker/dev/Dockerfile.laboratory
    environment:
      - MONGO_URI=mongodb://mongodb:27017/?authSource=admin
      - NODE_ENV=${APP_RUN_MODE:-development}
      - PORT=4023
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
    expose:
      - "4023"
    volumes:
      - ./laboratory:/usr/src/laboratory
    depends_on:
      mongodb-init:
        condition: service_completed_successfully
    networks:
      - bucketLab_internal
    restart: always

  # Authentication Server (Internal Service)
  authentication_server:
    container_name: authentication_server_dev
    build:
      context: .
      dockerfile: docker/dev/Dockerfile.authentication
    environment:
      - MONGO_URI=mongodb://mongodb:27017/?authSource=admin
      - NODE_ENV=${APP_RUN_MODE:-development}
      - PORT=4024
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
    expose:
      - "4024"
    volumes:
      - ./authentication:/usr/src/authentication
    depends_on:
      mongodb-init:
        condition: service_completed_successfully
    networks:
      - bucketLab_internal
    restart: always

  # Administration Server (Internal Service)
  administration_server:
    container_name: administration_server_dev
    build:
      context: .
      dockerfile: docker/dev/Dockerfile.administration
    environment:
      - MONGO_URI=mongodb://mongodb:27017/?authSource=admin
      - NODE_ENV=${APP_RUN_MODE:-development}
      - PORT=4025
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
    expose:
      - "4025"
    volumes:
      - ./administration:/usr/src/administration
    depends_on:
      mongodb-init:
        condition: service_completed_successfully
    networks:
      - bucketLab_internal
    restart: always

volumes:
  mongodb_data_dev:
    driver: local
  avatars_data_dev:
    driver: local

networks:
  bucketLab_internal:
    driver: bridge
    name: bucketLab_internal
